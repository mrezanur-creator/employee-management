name: Java CI with Maven + JaCoCo

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # 3. Cache Maven packages
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # 4. Run tests + coverage
      - name: Build and test with Maven
        run: mvn clean verify

      # 5. Login ke GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/employee-management:latest .

      # 7. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/employee-management:latest

      # 8. Upload JaCoCo report
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # 9. Upload test report (only if failure)
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      # 10. Print surefire logs
      - name: Print surefire logs
        if: failure()
        run: cat target/surefire-reports/*.txt || true