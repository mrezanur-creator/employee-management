apiVersion: v1
kind: Service
metadata:
  name: {{ include "employee-management.fullname" . }}
  labels:
    app: {{ include "employee-management.name" . }}
    {{- include "employee-management.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ include "employee-management.name" . }}