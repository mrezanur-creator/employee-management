apiVersion: v1
kind: Service
metadata:
  name: {{ include "employee-management-chart.fullname" . }}
  labels:
    app: {{ include "employee-management-chart.name" . }}
    {{- include "employee-management-chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: {{ include "employee-management-chart.name" . }}