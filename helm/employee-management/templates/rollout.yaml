apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "employee-management-chart.fullname" . }}
  labels:
    {{- include "employee-management-chart.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.rollout.revisionHistoryLimit }}

  selector:
    matchLabels:
      app: {{ include "employee-management-chart.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "employee-management-chart.name" . }}

    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.spring.profiles | quote }}

            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: datasource-url

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: datasource-username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: datasource-password

          resources:
  {{ toYaml .Values.resources | nindent 12 }}

strategy:
  canary:
  {{ if .Values.rollout.canary.enabled }}
stableService: {{ include "employee-management-chart.fullname" . }}
canaryService: {{ include "employee-management-chart.fullname" . }}-canary
  {{ end }}
maxSurge: {{ .Values.rollout.canary.maxSurge }}
maxUnavailable: {{ .Values.rollout.canary.maxUnavailable }}

steps:
  {{ toYaml .Values.rollout.canary.steps | nindent 8 }}