replicaCount: 1

image:
  repository: ""
  pullPolicy: Always

spring:
  profiles: docker

secret:
  name: employee-management-secret

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

rollout:
  revisionHistoryLimit: 3

  canary:
    maxSurge: 1
    maxUnavailable: 0

    steps: []