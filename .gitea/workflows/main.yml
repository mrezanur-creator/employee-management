name: Employee Management CD (Deploy After QA)

on:
  push:
    branches:
      - main
env:
  CHART_PATH: helm/employee-management

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Cetak Path
        run: echo "${{ env.CHART_PATH }}"

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Start Employee API App
        shell: powershell
        run: |
          try {
              docker rm -f employee-app-test
          } catch {}

          $VERSION = "1.0.137"

          Write-Host "[INFO] Pull image ghcr.io/mrezanur-creator/employee-management:$VERSION"

          docker pull ghcr.io/mrezanur-creator/employee-management:$VERSION

          Write-Host "[INFO] Menjalankan container..."

          docker run -d `
            --name employee-app-test `
            -p 8082:8000 `
            ghcr.io/mrezanur-creator/employee-management:$VERSION

          Write-Host "[INFO] Menunggu aplikasi siap..."

          $maxRetry = 30

          for ($i = 1; $i -le $maxRetry; $i++) {

              try {
                  $health = Invoke-RestMethod http://localhost:8082/actuator/health

                  if ($health.status -eq "UP") {
                      Write-Host "[SUCCESS] Application is UP"
                      break
                  }
              }
              catch {
                  Write-Host "Waiting... ($i/$maxRetry)"
              }

              Start-Sleep -Seconds 2
          }

          if ($i -gt $maxRetry) {
              Write-Host "[ERROR] Application gagal startup!"
              docker logs employee-app-test
              exit 1
          }

      # -----------------------------------------------------------------
      # 🚀 STEP 2: JALANKAN AUTOMATION TEST .JSON LU
      # -----------------------------------------------------------------
      - name: Execute Employee API Tests
        shell: powershell
        run: |
          Write-Host "[START] Menjalankan Automated API Testing via Newman..."

          newman run "qa-tests/Employee_API_Tests.json" --color on

          if ($LASTEXITCODE -ne 0) {
              Write-Error "Automation Test FAILED!"
              docker logs employee-app-test
              exit 1
          }

          Write-Host "[SUCCESS] Semua API test berhasil."

      - name: Cleanup Test Container
        if: always()
        shell: powershell
        run: |
          try {
              docker rm -f employee-app-test
          } catch {}

      # -----------------------------------------------------------------
      # 🏓 STEP 3: JIKA SUKSES, OPER BALIK BOLA PING-PONG KE REPO REZA
      # -----------------------------------------------------------------
      - name: Test Success! Trigger Deploy in Reza Repo
        shell: powershell
        if: success() # Hanya jalan kalau step testing di atas 100% sukses tanpa ada yang fail
        env:
          GITEA_TOKEN: ${{ secrets.QA_TOKEN }} # Token tim-qa yang punya akses admin di repo reza
        run: |
          # Mengambil murni angka versi dari tag pengirim (misal qa-1.0.107 -> ambil 1.0.107)
          $fullTag = "$env:GITHUB_REF_NAME"
          $ver = $fullTag.Replace("qa-", "").Trim()
          $deployTagName = "deploy-$ver"
          
          Write-Host "[SUCCESS] Testing Aman! Mengirim tag balasan resmi: $deployTagName ke repo reza..."
          
          # Gunakan try-catch lagi untuk membuang remote lama tanpa memicu NativeCommandError
          try { git remote remove reza-repo } catch {}
          
          # Inject Auth ke remote gitea repo reza
          git remote add reza-repo "http://tim-qa:${env:GITEA_TOKEN}@gitea.local.env:8081/reza/employee-management2.git"
          
          # Buat tag deploy lokal lalu dorong ke repo reza
          git tag $deployTagName
          git push reza-repo $deployTagName
          
          Write-Host "🏓 BOLA DIKEMBALIKAN! Repo reza akan otomatis melanjutkan proses Deploy!"
