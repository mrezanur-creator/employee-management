name: Employee Management CD (Deploy After QA)

on:
  push:
    tags:
      - 'qa-*'
env:
  CHART_PATH: helm/employee-management

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Cetak Path
        run: echo "${{ env.CHART_PATH }}"

      - name: Checkout Repo
        uses: actions/checkout@v4

      # Trik pengganti inputs: Mengambil versi riil langsung dari Chart.yaml hasil build tadi
      - name: Get Version From Chart
        id: get_ver
        shell: powershell
        run: |
          $chartContent = Get-Content "${{ env.CHART_PATH }}/Chart.yaml"
          $versionLine = $chartContent | Select-String -Pattern "version:"
          $currentVer = ($versionLine -split ":")[1].Trim()
          Write-Output "::set-output name=VERSION::$currentVer"
          Write-Host "Mendeteksi versi otomatis dari Chart: $currentVer"

      # ------------------------------------------------
      # Deploy ke OpenShift via SSH
      # ------------------------------------------------
      - name: Deploy to OpenShift
        shell: powershell
        run: |
          $VERSION = "${{ steps.get_ver.outputs.VERSION }}".Trim()
          Write-Host "Memulai deployment OpenShift untuk versi: $VERSION"
          
          ssh root@100.103.175.35 "
            set -e
            echo 'Mengimport image untuk versi: $VERSION'
            oc import-image employee-management:$VERSION \
              --from='ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:'$VERSION \
              --confirm \
              -n employee-management
          
            oc tag employee-management/employee-management:$VERSION employee-management-prod/employee-management-prod:$VERSION
            helm repo add employee-management http://chartmuseum.local.env:8081/employee-management --force-update
            helm repo update
          "

      # ------------------------------------------------
      # Otomatisasi Update Manifest GitOps
      # ------------------------------------------------
      - name: Update GitOps Repository
        shell: powershell
        env:
          GITEA_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          $newVer = "${{ steps.get_ver.outputs.VERSION }}".Trim()
          
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot"
          
          git clone http://ci-bot:${env:GITEA_TOKEN}@gitea.local.env:8081/gitops/gitops-config.git gitops-repo
          cd gitops-repo
          
          $targetFile = "dev/apps/employee-management-apps.yaml"
          $lines = Get-Content $targetFile
          $foundRepo = $false

          for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "repoURL:.*employee-management/") {
                  $foundRepo = $true
                  continue
              }
              if ($foundRepo -and $lines[$i] -match "targetRevision:") {
                  $lines[$i] = "      targetRevision: $newVer"
                  $foundRepo = $false
              }
          }
          $lines | Set-Content $targetFile
          
          git add $targetFile
          git commit -m "chore(gitops): auto-update employee-management to version $newVer [skip ci]"
          git push origin master