name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build & Test with JaCoCo
        run: mvn clean verify "-Dmaven.repo.local=C:\Users\Alpabit\.m2\repository"

      # -----------------------------------------------------------------
      # OPTION 2: Real Internal API Testing (Bebas Emoji & Aman Encoding)
      # -----------------------------------------------------------------
      - name: Real Internal API Testing
        shell: powershell
        run: |
          # Tambahkan ini di baris pertama step "Real Internal API Testing" jika port sering macet
          Get-Process -Name java -ErrorAction SilentlyContinue | Where-Object { (Get-NetTCPConnection -LocalPort 8082 -ErrorAction SilentlyContinue).OwningProcess -contains $_.Id } | Stop-Process -Force
          Write-Host "[INFO] Menyalakan aplikasi Spring Boot secara riil di background..."
          
          # 1. Cari file .jar hasil build Maven secara dinamis
          $jarFile = Get-ChildItem -Path target -Filter "*.jar" | Select-Object -First 1
          if (-not $jarFile) {
              Write-Error "[ERROR] File .jar tidak ditemukan di folder target!"
              exit 1
          }
          
          # 2. Jalankan JAR di port 8082 secara terpisah (background)
          $appProcess = Start-Process java -ArgumentList "-jar $($jarFile.FullName) --server.port=8082" -WindowStyle Hidden -PassThru
          Write-Host "[INFO] Menunggu server Tomcat internal naik (15 detik)..."
          Start-Sleep -Seconds 15
          
          # 3. Eksekusi Test HTTP Request
          try {
              Write-Host "[TEST] Nembak Endpoint Actuator Health Check..."
              $health = Invoke-RestMethod -Uri "http://localhost:8082/actuator/health" -Method Get
          
              Write-Host "   Status Aplikasi: $($health.status)"
              Write-Host "   Detail Actuator: "
              Write-Host ($health | ConvertTo-Json -Depth 3)
          
              Write-Host "-------------------------------------------------------"
              Write-Host "[TEST] Nembak Endpoint Bisnis: GET /api/employees"
              $response = Invoke-RestMethod -Uri "http://localhost:8082/api/employees" -Method Get
          
              Write-Host "[SUCCESS] Aplikasi merespons dengan baik."
              Write-Host "   Response Data dari Database:"
              Write-Host ($response | ConvertTo-Json -Depth 5)
          
          } catch {
              Write-Error "[ERROR] API Test GAGAL! Terjadi kesalahan saat nembak endpoint: $_"
          
              if ($_.Exception.Response) {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $errorResponse = $reader.ReadToEnd()
                  Write-Host "[WARN] Error Response dari Server: $errorResponse"
              }
          
              # Pastikan proses dimatikan jika error
              Stop-Process -Id $appProcess.Id -Force
              exit 1
          }
          
          # 4. Bersihkan proses setelah sukses
          Write-Host "[INFO] Mematikan server aplikasi internal test..."
          Stop-Process -Id $appProcess.Id -Force  

      # ------------------------------------------------
      # Generate Version (Menggunakan Run Number Gitea)
      # ------------------------------------------------
      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          $version="1.0.${{ github.run_number }}"
          # $version="1.0.84"
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version Otomatis Baru = $version"

      # ------------------------------------------------
      # Docker Build & Push
      # ------------------------------------------------
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      # ------------------------------------------------
      # Update values.yaml & Chart.yaml secara fisik
      # ------------------------------------------------
      - name: Update Helm Files (values & Chart)
        shell: powershell
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # Update version dan appVersion di Chart.yaml
          $chartPath = "${{ env.CHART_PATH }}/Chart.yaml"
          (Get-Content $chartPath) `
            -replace '(?<=\b)version:.*', ("version: $newVer") `
            -replace 'appVersion:.*', ("appVersion: `"$newVer`"") | Set-Content $chartPath

      - name: Verify Helm Files
        shell: powershell
        run: |
          Write-Host "===== Hasil Update Chart.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/Chart.yaml"   

      # ------------------------------------------------
      # Helm Steps
      # ------------------------------------------------
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }} --debug

      - name: Helm Package
        run: |
          helm package ${{ env.CHART_PATH }}

      - name: Helm Repo Update
        run: helm repo update

      - name: Push Helm Chart
        shell: powershell
        run: |
          helm cm-push employee-management-${{ steps.versioning.outputs.IMAGE_VERSION }}.tgz employee-management

      # ------------------------------------------------
      # Push File .tgz & Laporan JaCoCo ke Repo File-History
      # ------------------------------------------------
      - name: Push Helm Chart & JaCoCo to File History Repo
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          $packageName = "employee-management-$newVer.tgz"
          
          Write-Host "Mencari file paket Helm: $packageName ..."
          $targetFile = Get-ChildItem -Path . -Filter $packageName -Recurse | Select-Object -First 1
          if (-not $targetFile) {
              Write-Error "Gagal: File $packageName tidak ditemukan!"
              exit 1
          }
          
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot Audit"
          
          Write-Host "Cloning repo mrezanur-creator/File-History..."
          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("mrezanur-creator:${env:GH_TOKEN}"))
          git -c http.extraHeader="Authorization: Basic $base64Auth" clone "https://github.com/mrezanur-creator/File-History.git" history-repo
          
          cd history-repo
          git config http.extraHeader "Authorization: Basic $base64Auth"
          
          if (-not (Test-Path "helm-releases")) { 
              New-Item -ItemType Directory -Path "helm-releases" | Out-Null 
          }
          Copy-Item $targetFile.FullName -Destination "helm-releases/"
          git add "helm-releases/$packageName"
          
          $jacocoPath = "../target/site/jacoco"
          if (Test-Path $jacocoPath) {
              $coverageDest = "coverage-history/$newVer"
              if (-not (Test-Path $coverageDest)) { 
                  New-Item -ItemType Directory -Path $coverageDest | Out-Null 
              }
              Copy-Item -Path "$jacocoPath\*" -Destination $coverageDest -Recurse -Force
              git add "coverage-history/$newVer/*"
              Write-Host "Laporan JaCoCo berhasil disalin."
          
              # --- GENERATE DASHBOARD LANDING PAGE ---
              $allVersions = Get-ChildItem -Path "coverage-history" -Directory | Select-Object -ExpandProperty Name | Sort-Object {[version]$_} -Descending
              $htmlContent = @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>JaCoCo Dashboard</title>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
          </head>
          <body class="bg-light p-5">
              <div class="container card p-4 shadow">
                  <h2 class="mb-4">📊 JaCoCo Code Coverage History</h2>
                  <table class="table table-striped">
                      <thead class="table-dark"><tr><th>#</th><th>Versi</th><th>Paket Helm</th><th>Aksi</th></tr></thead>
                      <tbody>
          "@
              $counter = 1
              foreach ($v in $allVersions) {
                  $tgzFile = "employee-management-$v.tgz"
                  $htmlContent += "<tr><td>$counter</td><td><strong>v$v</strong></td><td><code>$tgzFile</code></td><td><a href='./coverage-history/$v/index.html' class='btn btn-sm btn-success' target='_blank'>Buka Laporan</a></td></tr>"
                  $counter++
              }
              $htmlContent += "</tbody></table></div></body></html>"
              $htmlContent | Set-Content -Path "index.html" -Encoding utf8
              git add "index.html"
          }
          
          $gitStatus = git status --porcelain
          if ($gitStatus) {
              git commit -m "chore(dashboard): auto-update matrix report for version $newVer [skip ci]"
              git push origin HEAD:main
          }
          
          # KOREKSI: Kembali ke root folder proyek utama aplikasi agar step di bawah tidak salah path
          cd ..

      # ------------------------------------------------
      # Deploy ke OpenShift via SSH (Hanya Import Image)
      # ------------------------------------------------
      - name: Deploy to OpenShift
        if: github.event_name == 'push'
        shell: powershell
        run: |
          $VERSION = "${{ steps.versioning.outputs.IMAGE_VERSION }}".Trim()
          
          ssh root@100.103.175.35 "
            set -e
            echo 'Mengimport image untuk versi: $VERSION'
          
            oc import-image employee-management:$VERSION \
              --from='ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:'$VERSION \
              --confirm \
              -n employee-management

            helm repo add employee-management http://chartmuseum.local.env:8081/employee-management --force-update
            helm repo update
          "

      # ------------------------------------------------
      # Otomatisasi Update Manifest GitOps
      # ------------------------------------------------
      - name: Update GitOps Repository
        shell: powershell
        env:
          GITEA_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot"
          
          git clone http://ci-bot:${env:GITEA_TOKEN}@gitea.local.env:8081/gitops/gitops-config.git gitops-repo
          cd gitops-repo
          
          $targetFile = "dev/apps/employee-management-apps.yaml"
          $lines = Get-Content $targetFile
          $foundRepo = $false

          for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match "repoURL:.*employee-management/") {
                  $foundRepo = $true
                  continue
              }
              if ($foundRepo -and $lines[$i] -match "targetRevision:") {
                  $lines[$i] = "      targetRevision: $newVer"
                  $foundRepo = $false
              }
          }

          $lines | Set-Content $targetFile
          
          git add $targetFile
          git commit -m "chore(gitops): auto-update employee-management to version $newVer [skip ci]"
          git push origin master