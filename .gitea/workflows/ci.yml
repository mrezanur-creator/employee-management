name: Build and Deploy Employee Management

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # 3. Cache Maven packages
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # 4. Run tests + coverage
      - name: Build and test with Maven
        run: mvn clean verify

      # 5. Login ke GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}        

      # 6. Build Docker Image
      - name: Build Docker Image
        shell: powershell
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:latest .

      # 7. Push Docker Image
      - name: Push Docker Image
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:latest

        # Login OpenShift
      - name: Login OpenShift
        shell: powershell
        run: |
          oc login https://api.crc.testing:6443 --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify=true

      # Import Image
      - name: Import Image
        shell: powershell
        run: |
          oc import-image employee-management --from=ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:latest --confirm

      # Restart Deployment
      - name: Restart Deployment
        shell: powershell
        run: |
          oc rollout restart deployment employee-management  
        
      - name: Wait for Rollout
        shell: powershell
        run: |
          oc rollout status deployment/employee-management

      # 9. Upload test report (only if failure)
      - name: Upload test report
        if: ${{ failure() && github.server_url == 'https://github.com' }}
        uses: actions/upload-artifact@v4
        with:
            name: surefire-reports
            path: target/surefire-reports
