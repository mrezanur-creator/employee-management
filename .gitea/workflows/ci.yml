name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write
  
env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

     # - name: Cache Maven
       # uses: actions/cache@v4
       # with:
          #path: .m2/repository
          #key: maven-${{ hashFiles('**/pom.xml') }}
          #restore-keys: |
           # maven-
            
      # Menggunakan jalur absolut agar plugin cache di Windows tidak bingung
         # path: ${{ github.workspace }}/.m2/repository
          #key: maven-${{ hashFiles('**/pom.xml') }}
          #restore-keys: |
          #  maven-      

      - name: Build & Test with JaCoCo
        #run: mvn clean verify "-Dmaven.repo.local=.m2/repository"
        #run: mvn clean verify "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
        run: mvn clean verify "-Dmaven.repo.local=C:\Users\Alpabit\.m2\repository"
        #run: mvn clean verify jacoco:report "-Dmaven.repo.local=C:\Users\Alpabit\.m2\repository"
      

      # ------------------------------------------------
      # Generate Version (Menggunakan Run Number Gitea)
      # ------------------------------------------------
      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          # $version="1.0.${{ github.run_number }}"
          $version="1.0.66"
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version Otomatis Baru = $version"

      # ------------------------------------------------
      # Docker Build & Push
      # ------------------------------------------------
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      # ------------------------------------------------
      # Update values.yaml & Chart.yaml secara fisik
      # ------------------------------------------------
      - name: Update Helm Files (values & Chart)
        shell: powershell
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # 1. Update tag di values.yaml (Uncomment jika dibutuhkan)
          # $valuesPath = "${{ env.CHART_PATH }}/values.yaml"
          # (Get-Content $valuesPath) -replace 'tag:.*', ("tag: `"$newVer`"") | Set-Content $valuesPath
          
          # 2. Update version dan appVersion di Chart.yaml
          $chartPath = "${{ env.CHART_PATH }}/Chart.yaml"
          (Get-Content $chartPath) `
            -replace '(?<=\b)version:.*', ("version: $newVer") `
            -replace 'appVersion:.*', ("appVersion: `"$newVer`"") | Set-Content $chartPath

      - name: Verify Helm Files
        shell: powershell
        run: |
          Write-Host "===== Hasil Update Chart.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/Chart.yaml"   

      # ------------------------------------------------
      # Helm Steps
      # ------------------------------------------------
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }} --debug

      - name: Helm Package
        run: |
          helm package ${{ env.CHART_PATH }}

      - name: Helm Repo Update
        run: helm repo update

      - name: Push Helm Chart
        shell: powershell
        run: |
          helm cm-push employee-management-${{ steps.versioning.outputs.IMAGE_VERSION }}.tgz employee-management
        
      # ------------------------------------------------
      # Push File .tgz & Laporan JaCoCo ke Repo File-History
      # ------------------------------------------------
      - name: Push Helm Chart & JaCoCo to File History Repo
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }} # Pastikan token ini punya akses write ke repo File-History
        run: |
          # 1. Ambil versi secara dinamis dari step sebelumnya
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          $packageName = "employee-management-$newVer.tgz"
          
          # 2. Cari file .tgz hasil compile di workspace saat ini
          Write-Host "Mencari file paket Helm: $packageName ..."
          $targetFile = Get-ChildItem -Path . -Filter $packageName -Recurse | Select-Object -First 1
          if (-not $targetFile) {
              Write-Error "Gagal: File $packageName tidak ditemukan! Periksa step Helm Package Anda."
              exit 1
          }
          
          # 3. Setup Identitas Git global
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot Audit"
          
          # 4. Clone repositori File-History dengan aman tanpa mengotori Windows Credential Manager
          Write-Host "Cloning repo mrezanur-creator/File-History..."
          
          # Kita gunakan flag -c http.extraHeader untuk menyuntikkan token secara langsung dan rapi
          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("mrezanur-creator:${env:GH_TOKEN}"))
          git -c http.extraHeader="Authorization: Basic $base64Auth" clone "https://github.com/mrezanur-creator/File-History.git" history-repo
          
          cd history-repo
          
          # Daftarkan konfigurasi ekstraHeader agar proses push di bawah nanti otomatis terautentikasi
          git config http.extraHeader "Authorization: Basic $base64Auth"
          
          # 5. Salin file .tgz ke folder 'helm-releases' di dalam repo history
          if (-not (Test-Path "helm-releases")) { 
              New-Item -ItemType Directory -Path "helm-releases" | Out-Null 
          }
          Copy-Item $targetFile.FullName -Destination "helm-releases/"
          git add "helm-releases/$packageName"
          
          # 6. Salin laporan JaCoCo HTML ke folder 'coverage-history/versi-angka'
          $jacocoPath = "../target/site/jacoco"
          if (Test-Path $jacocoPath) {
              $coverageDest = "coverage-history/$newVer"
              if (-not (Test-Path $coverageDest)) { 
                  New-Item -ItemType Directory -Path $coverageDest | Out-Null 
              }
              Copy-Item -Path "$jacocoPath\*" -Destination $coverageDest -Recurse -Force
              git add "coverage-history/$newVer/*"
              Write-Host "Laporan JaCoCo berhasil disalin ke folder coverage-history/$newVer"
          
              # ----------------------------------------------------------------
              # OTOMATISASI GENERATE DASHBOARD UTAMA (REKAP VERSI)
              # ----------------------------------------------------------------
              Write-Host "Memperbarui index Dashboard Utama..."
          
              # Ambil semua folder versi yang ada di dalam coverage-history
              $allVersions = Get-ChildItem -Path "coverage-history" -Directory | Select-Object -ExpandProperty Name | Sort-Object {[version]$_} -Descending
          
              # Mulai susun struktur HTML untuk file index.html utama
              $htmlContent = @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>JaCoCo Code Coverage History Dashboard</title>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
              <style>
                  body { background-color: #f8f9fa; padding-top: 30px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
                  .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
                  .table-hover tbody tr:hover { background-color: #f1f3f5; }
                  .header-title { color: #212529; font-weight: 700; margin-bottom: 20px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="row justify-content-center">
                      <div class="col-md-10">
                          <div class="d-flex align-items-center justify-content-between mb-4">
                              <h2 class="header-title">📊 JaCoCo Code Coverage History</h2>
                              <span class="badge bg-primary">Last Updated: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")</span>
                          </div>
          
                          <div class="card p-4 mb-4">
                              <h5 class="card-title text-secondary mb-3">Daftar Riwayat Build Proyek</h5>
                              <div class="table-responsive">
                                  <table class="table table-striped table-hover align-middle">
                                      <thead class="table-dark">
                                          <tr>
                                              <th>#</th>
                                              <th>Versi Aplikasi</th>
                                              <th>Paket Helm (.tgz)</th>
                                              <th class="text-end">Aksi Laporan</th>
                                          </tr>
                                      </thead>
                                      <tbody>
          "@
          
              # Loop untuk memasukkan daftar versi ke dalam baris tabel HTML
              $counter = 1
              foreach ($v in $allVersions) {
                  $tgzFile = "employee-management-$v.tgz"
                  $htmlContent += @"
                                          <tr>
                                              <td>$counter</td>
                                              <td><strong>v$v</strong></td>
                                              <td><code class="text-danger">$tgzFile</code></td>
                                              <td class="text-end">
                                                  <a href="./coverage-history/$v/index.html" class="btn btn-sm btn-outline-success" target="_blank">👁️ Buka Laporan Coverage</a>
                                              </td>
                                          </tr>
          "@
                  $counter++
              }
          
              # Penutup struktur file HTML
              $htmlContent += @"
                                      </tbody>
                                  </table>
                              </div>
                          </div>
                          <footer class="text-center text-muted mt-5 small">
                              Automated by Gitea CI Bot &bull; File-History Repository
                          </footer>
                      </div>
                  </div>
              </div>
          </body>
          </html>
          "@
          
              # Simpan hasilnya menjadi file index.html di root repo File-History
              $htmlContent | Set-Content -Path "index.html" -Encoding utf8
              git add "index.html"
          
          } else {
              Write-Host "Warning: Folder JaCoCo tidak ditemukan di $jacocoPath."
          }
          
          # 7. Commit dan Push semua perubahan ke GitHub File-History
          $gitStatus = git status --porcelain
          if ($gitStatus) {
              Write-Host "Mengirimkan artifact dan memperbarui dashboard ke GitHub..."
              git commit -m "chore(dashboard): auto-update matrix report for version $newVer [skip ci]"
              git push origin HEAD:main
          
              Write-Host "========================================================================="
              Write-Host "🚀 DASHBOARD UTAMA REKAP JACOCO TELAH DIPERBARUI!"
              Write-Host "👉 Buka Dashboard Utama Anda di sini:"
              Write-Host "   https://mrezanur-creator.github.io/File-History/"
              Write-Host "========================================================================="
          } else {
              Write-Host "Tidak ada perubahan baru."
          }
      # ------------------------------------------------
      # Deploy ke OpenShift via SSH (Hanya Import Image)
      # ------------------------------------------------
      - name: Deploy to OpenShift
        if: github.event_name == 'push'
        shell: powershell
        run: |
          $VERSION = "${{ steps.versioning.outputs.IMAGE_VERSION }}".Trim()
          
          ssh root@100.103.175.35 "
            set -e
            echo 'Mengimport image untuk versi: $VERSION'
            
            oc import-image employee-management:$VERSION \
              --from='ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:'$VERSION \
              --confirm \
              -n employee-management

            # Helm upgrade dimatikan karena sudah ditangani penuh oleh GitOps ArgoCD
            helm repo add employee-management http://chartmuseum.local.env:8081/employee-management --force-update
            helm repo update
          "
          
      # ------------------------------------------------
      # Otomatisasi Update Manifest GitOps
      # ------------------------------------------------
      - name: Update GitOps Repository
        shell: powershell
        env:
          GITEA_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # 1. Konfigurasi Git Identity
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot"
          
          # 2. Clone Repositori GitOps
          git clone http://ci-bot:${env:GITEA_TOKEN}@gitea.local.env:8081/gitops/gitops-config.git gitops-repo
          
          # 3. Masuk ke folder repo GitOps
          cd gitops-repo
          
          # 4. Perubahan Versi Dinamis Line-by-Line (Hanya targetRevision milik Helm Chart)
          $targetFile = "dev/apps/employee-management-apps.yaml"
          $lines = Get-Content $targetFile
          $foundRepo = $false

          for ($i = 0; $i -lt $lines.Count; $i++) {
              # Cari baris repoURL yang mengandung employee-management/
              if ($lines[$i] -match "repoURL:.*employee-management/") {
                  $foundRepo = $true
                  continue
              }
              
              # Ganti baris targetRevision terdekat tepat di bawahnya
              if ($foundRepo -and $lines[$i] -match "targetRevision:") {
                  $lines[$i] = "      targetRevision: $newVer"
                  $foundRepo = $false
              }
          }

          $lines | Set-Content $targetFile
          
          # 5. Commit dan Push Perubahan Kembali ke Gitea
          git add $targetFile
          git commit -m "chore(gitops): auto-update employee-management to version $newVer [skip ci]"
          git push origin master