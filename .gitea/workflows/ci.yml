name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write
  
env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 10 # Jika dalam 10 menit job belum kelar, Gitea akan mematikan job ini secara paksa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          # Kita simpan cache di dalam folder lokal proyek (bukan di user profile)
          path: .m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build
        run: mvn clean verify "-Dmaven.repo.local=.m2/repository"

      # ------------------------------------------------
      # Generate Version (Menggunakan Run Number Gitea)
      # ------------------------------------------------
      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          $version="1.0.${{ github.run_number }}"
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version Otomatis Baru = $version"

      # ------------------------------------------------
      # Docker Build & Push
      # ------------------------------------------------
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      # ------------------------------------------------
      # Update values.yaml & Chart.yaml secara fisik
      # ------------------------------------------------
      - name: Update Helm Files (values & Chart)
        shell: powershell
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # 1. Update tag di values.yaml
          $valuesPath = "${{ env.CHART_PATH }}/values.yaml"
          (Get-Content $valuesPath) -replace 'tag:.*', ("tag: `"$newVer`"") | Set-Content $valuesPath
          
          # 2. Update version dan appVersion di Chart.yaml (Regex Diperbaiki)
          $chartPath = "${{ env.CHART_PATH }}/Chart.yaml"
          (Get-Content $chartPath) `
            -replace '(?<=\b)version:.*', ("version: $newVer") `
            -replace 'appVersion:.*', ("appVersion: `"$newVer`"") | Set-Content $chartPath

      - name: Verify Helm Files
        shell: powershell
        run: |
          Write-Host "===== Hasil Update values.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/values.yaml"
          Write-Host "===== Hasil Update Chart.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/Chart.yaml"   

      # ------------------------------------------------
      # Helm Steps
      # ------------------------------------------------
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }} --debug

      - name: Helm Package
        run: |
          helm package ${{ env.CHART_PATH }}

      - name: Helm Repo Update
        run: helm repo update

      - name: Push Helm Chart
        shell: powershell
        run: |
          # Langsung memanggil versi dari ID versioning agar nama file sinkron sempurna
          helm cm-push employee-management-${{ steps.versioning.outputs.IMAGE_VERSION }}.tgz employee-management
         
      # ------------------------------------------------
      # Deploy ke OpenShift via SSH (Menggunakan Helm)
      # ------------------------------------------------
      - name: Deploy to OpenShift
        if: github.event_name == 'push'
        shell: powershell
        run: |
          # 1. Ambil nilai versi murni di PowerShell
          $VERSION = "${{ steps.versioning.outputs.IMAGE_VERSION }}".Trim()
          
          # 2. Kirim perintah SSH dengan menyuntikkan langsung variabel $VERSION ke dalam string
          ssh root@100.103.175.35 "
            set -e
            
            echo 'Mengimport image untuk versi: $VERSION'
            
            # 3. Jalankan import-image dengan menyuntikkan Secret Gitea secara aman
            oc import-image employee-management:$VERSION \
              --from='ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:'$VERSION \
              --confirm \
              -n employee-management

            # 4. Pastikan repo Helm terdaftar dan terupdate
            helm repo add employee-management http://127.0.0.1:8080/employee-management
            helm repo update
            
            # 5. Upgrade deployment
            helm upgrade --install employee-management employee-management \
              --repo http://127.0.0.1:8080/employee-management \
              --namespace employee-management \
              --set image.tag=$VERSION \
              --atomic \
              --timeout 5m

            # 6. Cetak log verifikasi
            echo '=================================================='
            echo 'DOCKER IMAGE YANG AKTIF SEKARANG DI OPENSHIFT:'
            oc get deployment employee-management -n employee-management -o jsonpath='{.spec.template.spec.containers[*].image}'
            echo -e '\n=================================================='
          "