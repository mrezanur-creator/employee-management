name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build & Test with JaCoCo
        run: mvn clean verify "-Dmaven.repo.local=C:\Users\Alpabit\.m2\repository"

      - name: Real Internal API Testing
        shell: powershell
        run: |
          Get-Process -Name java -ErrorAction SilentlyContinue | Where-Object { (Get-NetTCPConnection -LocalPort 8082 -ErrorAction SilentlyContinue).OwningProcess -contains $_.Id } | Stop-Process -Force
          Write-Host "[INFO] Menyalakan aplikasi Spring Boot secara riil di background..."
          
          $jarFile = Get-ChildItem -Path target -Filter "*.jar" | Select-Object -First 1
          if (-not $jarFile) {
              Write-Error "[ERROR] File .jar tidak ditemukan di folder target!"
              exit 1
          }
          
          $appProcess = Start-Process java -ArgumentList "-jar $($jarFile.FullName) --server.port=8082" -WindowStyle Hidden -PassThru
          Write-Host "[INFO] Menunggu server Tomcat internal naik (15 detik)..."
          Start-Sleep -Seconds 15
          
          try {
              Write-Host "[TEST] Nembak Endpoint Actuator Health Check..."
              $health = Invoke-RestMethod -Uri "http://localhost:8082/actuator/health" -Method Get
              Write-Host "   Status Aplikasi: $($health.status)"
          
              Write-Host "-------------------------------------------------------"
              Write-Host "[TEST] Nembak Endpoint Bisnis: GET /api/employees"
              $response = Invoke-RestMethod -Uri "http://localhost:8082/api/employees" -Method Get
              Write-Host "[SUCCESS] Aplikasi merespons dengan baik."
          
          } catch {
              Write-Error "[ERROR] API Test GAGAL! Terjadi kesalahan saat nembak endpoint: $_"
              Stop-Process -Id $appProcess.Id -Force
              exit 1
          }
          Stop-Process -Id $appProcess.Id -Force  

      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          $version="1.0.${{ github.run_number }}"
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version Otomatis Baru = $version"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      - name: Update Helm Files (values & Chart)
        shell: powershell
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          $chartPath = "${{ env.CHART_PATH }}/Chart.yaml"
          (Get-Content $chartPath) `
            -replace '(?<=\b)version:.*', ("version: $newVer") `
            -replace 'appVersion:.*', ("appVersion: `"$newVer`"") | Set-Content $chartPath

      - name: Helm Lint & Package
        run: |
          helm lint ${{ env.CHART_PATH }} --debug
          helm package ${{ env.CHART_PATH }}
          helm repo update

      - name: Push Helm Chart
        shell: powershell
        run: |
          helm cm-push employee-management-${{ steps.versioning.outputs.IMAGE_VERSION }}.tgz employee-management

      - name: Push Helm Chart & JaCoCo to File History Repo
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          $packageName = "employee-management-$newVer.tgz"
          $targetFile = Get-ChildItem -Path . -Filter $packageName -Recurse | Select-Object -First 1
          
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot Audit"
          
          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("mrezanur-creator:${env:GH_TOKEN}"))
          git -c http.extraHeader="Authorization: Basic $base64Auth" clone "https://github.com/mrezanur-creator/File-History.git" history-repo
          
          cd history-repo
          git config http.extraHeader "Authorization: Basic $base64Auth"
          if (-not (Test-Path "helm-releases")) { New-Item -ItemType Directory -Path "helm-releases" | Out-Null }
          Copy-Item $targetFile.FullName -Destination "helm-releases/"
          git add "helm-releases/$packageName"
          
          # (Bagian generate dashboard JaCoCo disingkat demi space, tetap aman)
          $gitStatus = git status --porcelain
          if ($gitStatus) {
              git commit -m "chore(dashboard): auto-update report v$newVer [skip ci]"
              git push origin HEAD:main
          }
          cd ..

      # -----------------------------------------------------------------
      # 🚀 STEP TERAKHIR JOB 1: TEMBAK AUTOMATION QA PIPELINE
      # -----------------------------------------------------------------
      - name: Trigger QA Pipeline
        shell: powershell
        env:
          GITEA_TOKEN: ${{ secrets.QA_TOKEN }}
        run: |
          $ver = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # GUNAKAN FULL REF AGAR GITEA GAK KESASAR (refs/heads/nama-branch)
          $body = @{ ref = "refs/heads/main" } | ConvertTo-Json
          
          Write-Host "[INFO] Mencoba nembak QA Pipeline dengan full ref..."
          Invoke-RestMethod -Uri "http://gitea.local.env:8081/api/v1/repos/reza/employee-management2/actions/workflows/qa-automation.yml/dispatches" `
            -Method Post -Headers @{ "Authorization" = "token ${env:GITEA_TOKEN}"; "Content-Type" = "application/json" } -Body $body
          
          Write-Host "[SUCCESS] Bola ping-pong berhasil di-smash ke area QA!"