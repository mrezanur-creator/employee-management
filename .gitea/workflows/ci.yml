name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write
  
env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Build
        run: mvn clean verify
      # ------------------------------------------------
      # Generate Version (Menggunakan Run Number Gitea)
      # ------------------------------------------------
      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          # Misal build ke-4, maka versi menjadi 0.1.4
          # Ini akan menjamin nilai versi selalu naik +1 dan tidak akan kembar
          $version="0.1.${{ github.run_number }}"
          
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version Otomatis Baru = $version"

      # ------------------------------------------------
      # Docker
      # ------------------------------------------------
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          # Panggil menggunakan format steps.[ID_STEP].outputs.[NAMA_OUTPUT]
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      # ------------------------------------------------
      # Update Helm
      # ------------------------------------------------
      - name: Update Helm Files
        shell: powershell
        run: |
          $valuesPath = "${{ env.CHART_PATH }}/values.yaml"
          $chartPath = "${{ env.CHART_PATH }}/Chart.yaml"
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # A. Update tag di values.yaml untuk Docker Image
          (Get-Content $valuesPath) -replace '^(\s*tag:\s*).*$', ('$1' + '"' + $newVer + '"') | Set-Content $valuesPath
          
          # B. Update version di Chart.yaml (Mencegah Error 409 saat cm-push)
          (Get-Content $chartPath) -replace '^(\s*version:\s*).*$', ('$1' + $newVer) | Set-Content $chartPath
          
          # C. Update appVersion di Chart.yaml (Sinkronisasi Label Aplikasi)
          (Get-Content $chartPath) -replace '^(\s*appVersion:\s*).*$', ('$1' + '"' + $newVer + '"') | Set-Content $chartPath
        
      - name: Verify values.yaml
        shell: powershell
        run: |
          Write-Host "===== Hasil Update values.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/values.yaml"     

      # ------------------------------------------------
      # Helm Steps
      # ------------------------------------------------
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }} --debug

      - name: Helm Package
        run: helm package ${{ env.CHART_PATH }}

      - name: Helm Repo Update
        run: helm repo update

      - name: Read Chart Version
        id: helm_versioning # Kita beri ID di sini
        shell: powershell
        run: |
          # Membaca versi asli dari Chart.yaml
          $chart=(Select-String '^version:' "${{ env.CHART_PATH }}/Chart.yaml").Line.Split(":")[1].Trim()
          
          # Menggunakan Workflow Commands (Aman untuk Windows Runner)
          Write-Output "::set-output name=CHART_VERSION::$chart"
          Write-Host "Chart Version Terbaca = $chart"

      - name: Push Helm Chart
        shell: powershell
        run: |
          # Panggil menggunakan steps.helm_versioning.outputs.CHART_VERSION
          helm cm-push employee-management-${{ steps.helm_versioning.outputs.CHART_VERSION }}.tgz employee-management