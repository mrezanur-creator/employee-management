name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write
  
env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Build
        run: mvn clean verify
      # ------------------------------------------------
      # Generate Version (Menggunakan Run Number Gitea)
      # ------------------------------------------------
      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          # github.run_number otomatis bernilai 1, 2, 3, 4, 5, dst.
          $version="1.0.${{ github.run_number }}"
          
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version terpilih = $version"

      # ------------------------------------------------
      # Docker
      # ------------------------------------------------
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          # Panggil menggunakan format steps.[ID_STEP].outputs.[NAMA_OUTPUT]
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      # ------------------------------------------------
      # Update Helm
      # ------------------------------------------------
      - name: Update values.yaml
        shell: powershell
        run: |
          $path = "${{ env.CHART_PATH }}/values.yaml"
          # Regex ini hanya mencari kata tag: lalu mengganti nilai di dalam tanda kutipnya saja
          (Get-Content $path) -replace 'tag:\s*".*"', 'tag: "${{ steps.versioning.outputs.IMAGE_VERSION }}"' | Set-Content $path
          
      - name: Verify values.yaml
        shell: powershell
        run: |
          Write-Host "===== Hasil Update values.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/values.yaml"     

      # ------------------------------------------------
      # Helm Steps
      # ------------------------------------------------
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }} --debug

      - name: Helm Package
        run: helm package ${{ env.CHART_PATH }}

      - name: Helm Repo Update
        run: helm repo update

      - name: Read Chart Version
        id: helm_versioning # Kita beri ID di sini
        shell: powershell
        run: |
          # Membaca versi asli dari Chart.yaml
          $chart=(Select-String '^version:' "${{ env.CHART_PATH }}/Chart.yaml").Line.Split(":")[1].Trim()
          
          # Menggunakan Workflow Commands (Aman untuk Windows Runner)
          Write-Output "::set-output name=CHART_VERSION::$chart"
          Write-Host "Chart Version Terbaca = $chart"

      - name: Push Helm Chart
        shell: powershell
        run: |
          # Panggil menggunakan steps.helm_versioning.outputs.CHART_VERSION
          helm cm-push employee-management-${{ steps.helm_versioning.outputs.CHART_VERSION }}.tgz employee-management