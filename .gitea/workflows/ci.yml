name: Employee Management CI

on:
  push:
    branches: [ "main", "master", "feature-employee-update" ]

permissions:
  contents: read
  packages: write
  
env:
  IMAGE_NAME: employee-management
  CHART_PATH: helm/employee-management

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build
        run: mvn clean verify "-Dmaven.repo.local=.m2/repository"

      # ------------------------------------------------
      # Generate Version (Menggunakan Run Number Gitea)
      # ------------------------------------------------
      # Catatan: Jika ingin otomatis naik terus, uncomment baris $version pertama
      # dan comment baris hardcode "1.0.45"
      - name: Generate Image Version
        id: versioning
        shell: powershell
        run: |
          # $version="1.0.${{ github.run_number }}"
          $version="1.0.46"
          Write-Output "::set-output name=IMAGE_VERSION::$version"
          Write-Host "Version Otomatis Baru = $version"

      # ------------------------------------------------
      # Docker Build & Push
      # ------------------------------------------------
      # Memastikan artifact image siap ditarik oleh OpenShift
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker
        shell: powershell
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }} .

      - name: Push Docker
        shell: powershell
        run: |
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:${{ steps.versioning.outputs.IMAGE_VERSION }}

      # ------------------------------------------------
      # Update values.yaml & Chart.yaml secara fisik
      # ------------------------------------------------
      - name: Update Helm Files (values & Chart)
        shell: powershell
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # 1. Update tag di values.yaml (Uncomment jika image tag mau disinkronkan ke file)
          # $valuesPath = "${{ env.CHART_PATH }}/values.yaml"
          # (Get-Content $valuesPath) -replace 'tag:.*', ("tag: `"$newVer`"") | Set-Content $valuesPath
          
          # 2. Update version dan appVersion di Chart.yaml (Regex Diperbaiki)
          $chartPath = "${{ env.CHART_PATH }}/Chart.yaml"
          (Get-Content $chartPath) `
            -replace '(?<=\b)version:.*', ("version: $newVer") `
            -replace 'appVersion:.*', ("appVersion: `"$newVer`"") | Set-Content $chartPath

      - name: Verify Helm Files
        shell: powershell
        run: |
          Write-Host "===== Hasil Update Chart.yaml ====="
          Get-Content "${{ env.CHART_PATH }}/Chart.yaml"   

      # ------------------------------------------------
      # Helm Steps
      # ------------------------------------------------
      - name: Helm Lint
        run: helm lint ${{ env.CHART_PATH }} --debug

      - name: Helm Package
        run: |
          helm package ${{ env.CHART_PATH }}

      - name: Helm Repo Update
        run: helm repo update

      - name: Push Helm Chart
        shell: powershell
        run: |
          helm cm-push employee-management-${{ steps.versioning.outputs.IMAGE_VERSION }}.tgz employee-management
         
      # ------------------------------------------------
      # Deploy ke OpenShift via SSH (Hanya Import Image)
      # ------------------------------------------------
      - name: Deploy to OpenShift
        if: github.event_name == 'push'
        shell: powershell
        run: |
          $VERSION = "${{ steps.versioning.outputs.IMAGE_VERSION }}".Trim()
          
          ssh root@100.103.175.35 "
            set -e
            echo 'Mengimport image untuk versi: $VERSION'
            
            oc import-image employee-management:$VERSION \
              --from='ghcr.io/${{ secrets.GHCR_USERNAME }}/employee-management:'$VERSION \
              --confirm \
              -n employee-management

            # Bagian helm upgrade dimatikan karena sudah ditangani penuh oleh GitOps ArgoCD
            helm repo add employee-management http://127.0.0.1:8080/employee-management
            helm repo update
          "
          
      # ------------------------------------------------
      # Otomatisasi Update Manifest GitOps
      # ------------------------------------------------
      - name: Update GitOps Repository
        shell: powershell
        env:
          GITEA_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          $newVer = "${{ steps.versioning.outputs.IMAGE_VERSION }}"
          
          # 1. Konfigurasi Git Identity
          git config --global user.email "ci-bot@gitea.local"
          git config --global user.name "CI Bot"
          
          # 2. Clone Repositori GitOps
          git clone http://ci-bot:${env:GITEA_TOKEN}@100.103.175.35:3000/gitops/gitops-config.git gitops-repo
          
          # 3. Masuk ke folder repo GitOps
          cd gitops-repo
          
          # 4. Jalankan Regex untuk update targetRevision
          $targetFile = "dev/apps/employee-management-apps.yaml"
          (Get-Content $targetFile) -replace 'targetRevision:.*', "targetRevision: $newVer" | Set-Content $targetFile
          
          # 5. Commit dan Push Perubahan Kembali ke Gitea
          git add $targetFile
          git commit -m "chore(gitops): auto-update employee-management to version $newVer [skip ci]"
          git push origin master